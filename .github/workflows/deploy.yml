name: Deploy to Bluehost

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            REPO="https://github.com/sophisticated-marketing-solutions/think-sophisticated.git"
            SCRATCH="$HOME/deploy-scratch"
            LIVE="/srv/htdocs/wp-content"

            # 1. refresh scratch clone
            if [ -d "$SCRATCH/.git" ]; then
              git -C "$SCRATCH" fetch origin main
              git -C "$SCRATCH" reset --hard origin/main
            else
              rm -rf "$SCRATCH"
              git clone --depth 1 -b main "$REPO" "$SCRATCH"
            fi

            # 2. sync ONLY the dirs Okara touches into the live writable tree
            rsync -a --delete "$SCRATCH/wp-content/themes/"     "$LIVE/themes/"
            rsync -a --delete "$SCRATCH/wp-content/mu-plugins/" "$LIVE/mu-plugins/"
            # 3. bust WP Rocket page cache (regenerates on next visit)
            rm -rf "$LIVE/cache/wp-rocket"/* 2>/dev/null || true
            echo "Cleared WP Rocket page cache"
            echo "Deployed $(git -C "$SCRATCH" rev-parse --short HEAD) at $(date)"